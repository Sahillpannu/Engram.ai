<svg width="100%" height="100%" viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Sky gradient: warm parchment tones -->
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c8b8a2" />
      <stop offset="100%" stop-color="#b09478" />
    </linearGradient>

    <!-- Sun glow radial gradient -->
    <radialGradient id="sunGlow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#f5e6d3" stop-opacity="0.65" />
      <stop offset="50%" stop-color="#dccab5" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#b09478" stop-opacity="0" />
    </radialGradient>

    <!-- Distant mountain gradient -->
    <linearGradient id="distantMtnGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a3d2e" />
      <stop offset="100%" stop-color="#2a2015" />
    </linearGradient>

    <!-- Midground hill gradient -->
    <linearGradient id="midHillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2e2416" />
      <stop offset="100%" stop-color="#191208" />
    </linearGradient>

    <!-- Foreground hill gradient -->
    <linearGradient id="foreHillGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1208" />
      <stop offset="100%" stop-color="#0a0703" />
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="1440" height="900" fill="url(#skyGrad)" />

  <!-- Sun Glow -->
  <ellipse cx="720" cy="270" rx="600" ry="400" fill="url(#sunGlow)" />

  <!-- Distant Mountains Layer 1 (Far) -->
  <path d="M 0 520 L 0 490 Q 200 400 400 450 T 800 410 T 1200 470 Q 1320 390 1440 500 L 1440 900 L 0 900 Z" fill="url(#distantMtnGrad)" opacity="0.75" />

  <!-- Distant Mountains Layer 2 (Medium Far) -->
  <path d="M 0 580 L 0 540 Q 280 460 560 500 T 1120 460 T 1440 550 L 1440 900 L 0 900 Z" fill="#3d3020" opacity="0.95" />

  <!-- Midground Hills -->
  <path d="M 0 650 L 0 600 C 350 560, 600 660, 900 580 C 1200 500, 1300 650, 1440 610 L 1440 900 L 0 900 Z" fill="url(#midHillGrad)" />

  <!-- Foreground Hills -->
  <path d="M 0 740 L 0 680 C 450 640, 750 760, 1050 670 C 1250 620, 1350 720, 1440 700 L 1440 900 L 0 900 Z" fill="url(#foreHillGrad)" />
</svg>
